<script>
  document.addEventListener('click', () => {
  document.getElementById('bgmusic').play();
}, { once: true });
function tip(e, name, dates, note) {
  const tt = document.getElementById('tt');
  tt.innerHTML = '<strong>' + name + '</strong><div class="dt">' + dates + '</div><div>' + note + '</div>';
  tt.classList.add('on');
  const margin = 12;
  let x = e.clientX + margin;
  let y = e.clientY + margin;
  if (x + 240 > window.innerWidth) x = e.clientX - 240 - margin;
  if (y + 140 > window.innerHeight) y = e.clientY - 140 - margin;
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.nb')) document.getElementById('tt').classList.remove('on');
});
</script>
